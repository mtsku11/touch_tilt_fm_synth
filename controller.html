<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="data:,">
  <title>Touch/Tilt Controller</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      touch-action: none;
      background: black;
      color: lime;
      font-family: monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }
    #xy-pad {
      border: 2px solid lime;
      width: 90vw;
      height: 70vh;
      touch-action: none;
      background: #111;
      position: relative;
    }
    .dot {
      position: absolute;
      width: 20px;
      height: 20px;
      background: lime;
      border-radius: 50%;
      transform: translate(-10px, -10px);
      pointer-events: none;
    }
  </style>
</head>
<body>
  <h2>🟢 Touch + Tilt Controller</h2>
  <button onclick="requestTiltPermission()">Enable Tilt</button>
  <div id="xy-pad"></div>

  <script>
    // get xy pad element
    const pad = document.getElementById("xy-pad");
    //open websocket connection
    const wsUrl = ["localhost", "127.0.0.1"].includes(window.location.hostname)
      ? `ws://${window.location.host}`
      : "wss://touch-tilt-ws.onrender.com";
    const socket = new WebSocket(wsUrl);
    // d minor pentatonic
    const scale = [62, 65, 67, 69, 72, 74, 78, 79, 81, 84, 86];
    //track current touches
    const touches = new Map();
    let lastTiltSentAt = 0;
    const clamp = (value, min, max) => Math.max(min, Math.min(max, value));
    const safeSend = (message) => {
      if (socket.readyState === WebSocket.OPEN) {
        socket.send(JSON.stringify(message));
      }
    };

    //touch listeners
    pad.addEventListener("touchstart", handleTouch);
    pad.addEventListener("touchmove", handleTouch);
    pad.addEventListener("touchend", handleTouchEnd);
    pad.addEventListener("touchcancel", handleTouchEnd);

    function handleTouchEnd(e) {
      for (let t of e.changedTouches) {
        const dot = document.getElementById(`dot-${t.identifier}`);
        if (dot) dot.remove();
        touches.delete(t.identifier);
        safeSend({ type: "off", id: t.identifier });
      }
    }

    //handle touch movement
    function handleTouch(e) {
      e.preventDefault();
      for (let t of e.touches) {
        const rect = pad.getBoundingClientRect();
        const x = clamp((t.clientX - rect.left) / rect.width, 0, 1);
        const y = clamp((t.clientY - rect.top) / rect.height, 0, 1);

        const scaleIndex = Math.floor((1 - y) * scale.length); // pitch from Y (top = high)
        const pitch = scale[clamp(scaleIndex, 0, scale.length - 1)];
        const amp = x * 0.75; // keep summed voices below clipping

        touches.set(t.identifier, { x, y });
        safeSend({
          type: "touch",
          id: t.identifier,
          pitch,
          amp
        });

        //create or update touch dot
        let dot = document.getElementById(`dot-${t.identifier}`);
        if (!dot) {
          dot = document.createElement("div");
          dot.classList.add("dot");
          dot.id = `dot-${t.identifier}`;
          pad.appendChild(dot);
        }
        dot.style.left = `${x * 100}%`;
        dot.style.top = `${y * 100}%`;
      }
    }


    // Tilt DeviceOrientation

    // request permission for device tilt
    function requestTiltPermission() {
      if (typeof DeviceOrientationEvent?.requestPermission === 'function') {
        DeviceOrientationEvent.requestPermission().then(response => {
          if (response === 'granted') {
            window.addEventListener('deviceorientation', handleTilt);
          } else {
            alert("Tilt permission denied");
          }
        });
      } else {
        window.addEventListener('deviceorientation', handleTilt);
      }
    }

    //handle device tilt
    function handleTilt(e) {
     const beta = e.beta || 0;   // front/back tilt
     const gamma = e.gamma || 0; // left/right tilt

     const midiToFreq = m => 440 * Math.pow(2, (m - 69) / 12);

     const fmFreqMin = midiToFreq(50);       // D3 146.83 Hz
     const fmFreqMax = midiToFreq(79);       // G5 783.99 Hz

     //front back tilt controls FM Frequency
     const betaNorm = clamp((beta + 60) / 120, 0, 1);
     const fmFreq = fmFreqMin + (fmFreqMax - fmFreqMin) * betaNorm;

     // left right tilt controls FM Index
     const gammaNorm = clamp(Math.abs(gamma) / 60, 0, 1);
     const fmIndex = gammaNorm * 0.9;

      const now = performance.now();
      if (now - lastTiltSentAt < 33) return;
      lastTiltSentAt = now;

      //send tilt data
      safeSend({
        type: "tilt",
        fmFreq,
        fmIndex
      });
    }
  </script>
</body>
</html>
